spring.application.name=servicio-citas

# TRUCO 1: Cambiamos el puerto a 8081. Si lo dejamos en 8080, chocará con tu servicio de pacientes.
server.port=8081

# TRUCO 2: Cambiamos el nombre de la BD a 'citas_db' y le agregamos 'createDatabaseIfNotExist=true'. 
# Así, los microservicios están separados profesionalmente y Spring creará la BD sola en tu Docker.
spring.datasource.url=jdbc:mysql://mysql-db:3306/citas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Configuración de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Solo necesitas el out-0
spring.cloud.stream.bindings.notificaciones-out-0.destination=notificaciones
spring.cloud.stream.bindings.notificaciones-out-0.content-type=text/plain
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest