spring.application.name=servicio-lista-espera

# PUERTO DIFERENTE PARA EVITAR CONFLICTOS
server.port=8082

# CONFIGURACIÓN DE BASE DE DATOS (espera_db)
spring.datasource.url=jdbc:mysql://mysql-db:3306/espera_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect