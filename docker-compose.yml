

services:
  mysql-db:
    image: mysql:8.0
    container_name: rednorte-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql-data:/var/lib/mysql
      # Este comando crea las dos bases de datos al iniciar el contenedor
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql-data: