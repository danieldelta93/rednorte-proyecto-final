version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      replicas: 1

  servicio-pacientes:
    image: rednorte-proyecto-final-servicio-pacientes
    build: ./servicio-pacientes
    depends_on:
      mysql-db:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  servicio-citas:
    image: rednorte-proyecto-final-servicio-citas
    build: ./servicio-citas
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  servicio-notificaciones:
    image: rednorte-proyecto-final-servicio-notificaciones
    build: ./servicio-notificaciones
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  servicio-lista-espera:
    image: rednorte-proyecto-final-servicio-lista-espera
    build: ./servicio-lista-espera
    depends_on:
      mysql-db:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  servicio-gateway:
    image: rednorte-proyecto-final-servicio-gateway
    build: ./servicio-gateway
    ports:
      - "8000:8000"
    depends_on:
      - servicio-pacientes
      - servicio-citas
      - servicio-lista-espera
      - servicio-notificaciones
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

volumes:
  mysql-data: