version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    # Cambiamos el nombre en Swarm no se usa container_name
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  servicio-pacientes:
    image: rednorte-proyecto-final-servicio-pacientes # Nombre que le dio docker-compose build
    build: ./servicio-pacientes
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    deploy:
      replicas: 2 # ¡Aquí empieza la magia! Tendrás 2 instancias corriendo
      resources:
        limits:
          memory: 512M

  servicio-citas:
    image: rednorte-proyecto-final-servicio-citas
    build: ./servicio-citas
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  servicio-notificaciones:
    image: rednorte-proyecto-final-servicio-notificaciones
    build: ./servicio-notificaciones
    ports:
      - "8083:8083"
    depends_on:
      - mysql-db
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  servicio-lista-espera:
    image: rednorte-proyecto-final-servicio-lista-espera
    build: ./servicio-lista-espera
    ports:
      - "8082:8082"
    depends_on:
      - mysql-db
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

volumes:
  mysql-data: