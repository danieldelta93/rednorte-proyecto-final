spring.application.name=servicio-notificaciones
server.port=8083

# Base de Datos
spring.datasource.url=jdbc:mysql://mysql-db:3306/notificaciones_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# CORRECCIÓN AQUÍ: Solo necesitamos el binding de entrada (in)
spring.cloud.stream.bindings.notificaciones-in-0.destination=notificaciones
spring.cloud.stream.function.definition=notificaciones
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration