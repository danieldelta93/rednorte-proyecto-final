spring.application.name=servicio-pacientes
server.port=8080
# Conexión a la Base de Datos MySQL en Docker
spring.datasource.url=jdbc:mysql://mysql-db:3306/pacientes_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Configuración de Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect